# Target Gene Seeds & Configuration

# General Settings
organism: "Homo sapiens"
max_targets: 50  # Cap on total candidates to process
include_controls: true
n_controls: 5

# Seed Lists
# These genes are automatically scored with D=2 (Developmental Relevance)

seeds:
  HOX:
    # HOX A Cluster
    - HOXA1
    - HOXA2
    - HOXA3
    - HOXA4
    - HOXA5
    - HOXA9
    - HOXA10
    - HOXA11
    - HOXA13
    # HOX B Cluster
    - HOXB1
    - HOXB4
    - HOXB9
    # HOX C Cluster
    - HOXC6
    - HOXC8
    # HOX D Cluster
    - HOXD4
    - HOXD9
    - HOXD13

  PAX:
    - PAX1  # Sclerotome/vertebrae
    - PAX3  # Myotome/neural crest
    - PAX9  # Vertebral bodies

  # Optional Expansion Sets (controlled by include_* flags below)
  expansion_modules:
    segmentation:
      - TBX6
      - MESP2
      - DLL3
      - HES7
      - LFNG

    mechanotransduction:
      - YAP1
      - WWTR1  # TAZ
      - VCL    # Vinculin
      - TLN1   # Talin-1

# Control Flags
include_expansion:
  segmentation: false
  mechanotransduction: false

# Control/Housekeeping genes (for contrast)
controls:
  - GAPDH
  - ACTB
  - ALB
