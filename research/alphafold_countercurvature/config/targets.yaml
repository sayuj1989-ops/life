# Target Gene Seeds & Configuration

# General Settings
organism: "Homo sapiens"
max_targets: 20  # Cap on total candidates to process, matching user default
include_controls: true
n_controls: 3

# Seed Lists
# These genes are automatically scored with D=2 (Developmental Relevance)

seeds:
  Core_Spine:
    - HOXA9
    - PAX1

  ECM:
    - COL2A1
    - ACAN
    - FN1

  Cytoskeleton:
    - ACTB
    - TUBA1A

  Adhesion:
    - CDH2
    - ITGB1

  Cilia:
    - KIF3A
    - IFT88

  Growth_Plate:
    - COMP
    - MATN3

  Morphogens:
    - SHH
    - BMP4
    - WNT3A

  expansion_modules:
    mechanotransduction:
      - YAP1
      - VCL

# Control Flags
include_expansion:
  mechanotransduction: true

# Control/Housekeeping genes (for contrast)
controls:
  - GAPDH
  - ALB
  - MYH9
